name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dev dependencies (puppeteer, gray-matter, marked)
        run: bun install

      - name: Install app dependencies
        run: bun install
        working-directory: app

      - name: Build CV PDF
        run: bun run build:cv

      - name: Build app (Astro)
        run: bun run build:app

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

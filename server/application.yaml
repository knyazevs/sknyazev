# Конфигурация сервера, читается Ktor'ом через ApplicationConfig.
# Синтаксис $VAR — чтение env-переменной; $VAR:default — с дефолтом.
# Мультиплатформенный YamlConfigLoader работает одинаково на JVM и K/N —
# ушли на него вместо dotenv-kmp, у которого systemEnv ломался на Native.

ktor:
  deployment:
    port: "$PORT:8080"

app:
  llm:
    baseUrl: "$LLM_BASE_URL:https://openrouter.ai/api/v1"
    model: "$LLM_MODEL:anthropic/claude-opus-4-7"
    classifierModel: "$CLASSIFIER_MODEL:openai/gpt-4o-mini"
    openRouterApiKey: "$OPENROUTER_API_KEY:"
  embedding:
    baseUrl: "$EMBEDDING_BASE_URL:https://api.openai.com/v1"
    model: "$EMBEDDING_MODEL:text-embedding-3-small"
    openAiApiKey: "$OPENAI_API_KEY:"
  rag:
    docsPath: "$DOCS_PATH:../docs"
    codePath: "$CODE_PATH:.."
    cachePath: "$CACHE_PATH:.embedding-cache.json"
  cors:
    allowedOrigin: "$CORS_ALLOWED_ORIGIN:http://localhost:4321,https://knyazevs.github.io"
  session:
    # Намеренно без дефолта — если переменная не задана, AppConfig.from() бросит
    # исключение на строке чтения (getString(), а не propertyOrNull).
    secret: "$SESSION_SECRET"

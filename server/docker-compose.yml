services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Place cert.pem and key.pem here (e.g. from Let's Encrypt / certbot)
      - ./ssl:/etc/ssl:ro
    depends_on:
      - ktor
    restart: unless-stopped

  ktor:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - .env
    restart: unless-stopped

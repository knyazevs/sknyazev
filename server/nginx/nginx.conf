user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $request - $status '
                    'ja3="$ssl_ja3" origin="$http_origin"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Allow-list of front-end Origins. Any browser-issued cross-site request
    # from a page on a different domain will carry a non-matching Origin and
    # be rejected. Empty Origin (curl, server-to-server) is allowed — the real
    # protection against those is the HMAC session token.
    map $http_origin $origin_allowed {
        default 0;
        ""                               1;
        "https://knyazevs.github.io"     1;
        "http://localhost:4321"          1;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS reverse proxy ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/ssl/cert.pem;
        ssl_certificate_key /etc/ssl/key.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Forward to Ktor — pass fingerprint signals as headers
        location /api/ {
            # Origin gate (browser-level): drop requests from unknown frontends.
            if ($origin_allowed = 0) {
                return 403;
            }

            proxy_pass         http://ktor:8080;
            proxy_http_version 1.1;

            # JA3 from TLS ClientHello (set by nginx-ssl-fingerprint module)
            proxy_set_header X-JA3-Fingerprint  $ssl_ja3;

            # Real client IP (nginx sits behind no other proxy on VPS)
            proxy_set_header X-Real-IP          $remote_addr;

            # Canvas fingerprint forwarded from browser
            proxy_set_header X-Fingerprint      $http_x_fingerprint;

            # Session token forwarded from browser
            proxy_set_header X-Api-Session      $http_x_api_session;

            proxy_set_header Host               $host;
            proxy_set_header Connection         "";

            # SSE support: disable buffering for /api/chat streaming
            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      120s;
        }
    }
}
